<head>
    <title>Contact Form</title>
<link rel="stylesheet" href="../CSS/form.css">
</head>
<body>
  <section class="form1">
    <h1>Queries/Support</h1>
    <h4>Having any queries,related to bookings?</h4>
    <section class="forming">
      <form id="contactForm">
        <section class="fname">
          <label name="fname">First Name </label>
          <input
            type="text"
            id="fname"
            placeholder="Enter Your First Name"
            required
          /><br />
        </section>
        <section class="lname">
          <label name="lname">Last Name</label>
          <input
            type="text"
            id="lname"
            placeholder="Enter Your Last Name"
            required
          /><br />
        </section>
        <section class="email">
          <label name="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
          /><br />
        </section>
        <section class="number">
          <label type="number">Contact No</label>
          <input
            type="number"
            id="number"
            placeholder="Number Please"
            required
          /><br />
        </section>
        <section class="enquiry">
          <label for="enquiryl">Enqueries Related to:</label><br />
          <input type="radio" id="flights" name="enquiryType" value="Flight Booking" required/>
          <label for="flights">Flight Booking</label><br />
          <input type="radio" id="Hotels" name="enquiryType" value="Hotel Booking" />
          <label for="Hotels">Hotel Booking</label><br />
          <input type="radio" id="Packages" name="enquiryType" value="Package Booking" />
          <label for="Packages">Package Booking</label><br />
          <input type="radio" id="Place" name="enquiryType" value="Place Booking" />
          <label for="Place">Place Booking</label><br />
        </section>
        <section class="button">
          <button type="submit">Submit</button>
        </section>
        <p id="successMessage"></p>
        <p id="errorMessage"></p>
      </form>
    </section>
  </section>

  <script src="../JS/form.js">

  </script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="jquery-effects.js"></script>


</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard - QuestVoyage</title>
<link rel="stylesheet" href="../CSS/admin.css">
</head>

<body>

<header>
<h2>Admin Dashboard</h2>
<button id="logoutBtn">Logout</button>
</header>

<div class="dashboard">

<div class="cards">
<div class="card">
<h3>Total Bookings</h3>
<p id="totalBookings">0</p>
</div>

<div class="card">
<h3>Total Revenue</h3>
<p id="totalRevenue">₹0</p>
</div>

<div class="card">
<h3>Total Wishlist Items</h3>
<p id="totalWishlist">0</p>
</div>
</div>

<div class="table-container">
<h3>All Bookings</h3>

<table>
<thead>
<tr>
<th>Booking ID</th>
<th>User</th>
<th>Package</th>
<th>Members</th>
<th>Total</th>
<th>Action</th>
<th>Process</th>
</tr>
</thead>

<tbody id="bookingTable"></tbody>

</table>
</div>

<div class="save-section">

<button class="save-btn green" onclick="saveProgress()">
Save Data
</button>

<button class="save-btn orange" onclick="downloadBackup()">
Download Backup
</button>
<button class="save-btn"
onclick="clearBookingsOnly()">
 Clear Bookings
</button>
<div id="saveMessage" class="save-message"></div>

</div>

</div>

<script src="../JS/admin.js"></script>

</body>
</html>
